name: Quant Dual-Core Sniper

on:
  schedule:
    - cron: '0 * * * *'
  
  workflow_dispatch:
  # 3. 🌟 新增：外部专属接口 (Webhook) 监听器
  repository_dispatch:
    # 这里的名字可以随便起，它是外部调用时的暗号 (Event Type)
    types: [trigger-sniper]
# 🛠️ 核心修复：强制底层插件使用 Node.js 24，消除官方过时警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-sniper:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Macro Sniper Engine
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          AUTH_CODE: ${{ secrets.AUTH_CODE }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          FRED_APIKEY: ${{ secrets.FRED_APIKEY }}
        run: |
          python sniper_github.py
          
      - name: Commit State and Logs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 自动更新：状态持久化与运行日志"
          file_pattern: 'sniper_state.json sniper_run.log'
